<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product mix vs target</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: transparent; }
  body {
    font-family: "Golos Text", "Roboto", "Segoe UI", Arial, sans-serif;
    color: #33333c;
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
    padding: 10px;
  }
  .widget {
    background: #ffffff;
    border: 1px solid #e8e8ed;
    border-radius: 10px;
    box-shadow: 0 1px 3px rgba(23, 27, 43, .04);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .widget-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 14px 18px 12px;
    border-bottom: 1px solid #f0f0f4;
  }
  .widget-title {
    font-size: 14px;
    font-weight: 600;
    color: #33333c;
    letter-spacing: -.1px;
  }
  .widget-subtitle {
    font-size: 11px;
    color: #8f8f9b;
  }
  .widget-body { padding: 0; }
  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  thead th {
    text-align: left;
    font-size: 10.5px;
    font-weight: 500;
    color: #8f8f9b;
    padding: 11px 18px 9px;
    border-bottom: 1px solid #f0f0f4;
    letter-spacing: .4px;
    text-transform: uppercase;
    background: #fafafb;
  }
  thead th.num { text-align: right; }
  tbody td {
    padding: 12px 18px;
    border-bottom: 1px solid #f5f5f8;
    font-size: 13px;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: #fafafb; }
  tbody td.category {
    font-weight: 500;
    color: #33333c;
    width: 30%;
  }
  tbody td.num {
    text-align: right;
    font-variant-numeric: tabular-nums;
    color: #33333c;
    width: 14%;
  }
  tbody td.gap {
    text-align: right;
    width: 16%;
  }
  .badge {
    display: inline-block;
    min-width: 48px;
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 10px;
    font-variant-numeric: tabular-nums;
    text-align: center;
  }
  .badge.red    { background: #fdecec; color: #a32d2d; }
  .badge.amber  { background: #fdf3e0; color: #8a5a08; }
  .badge.grey   { background: #f0f0f4; color: #5f5f6b; }
  .badge.green  { background: #e9f5ec; color: #2e6b45; }
  tbody tr.attn td.category::before {
    content: "";
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #d94a45;
    margin-right: 8px;
    vertical-align: middle;
  }
  .widget-footer {
    display: flex;
    gap: 16px;
    padding: 10px 18px 12px;
    font-size: 11px;
    color: #8f8f9b;
    border-top: 1px solid #f0f0f4;
    background: #fafafb;
  }
  .widget-footer .k { display: inline-flex; align-items: center; gap: 6px; }
  .widget-footer .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
</style>
</head>
<body>
  <div class="widget">
    <div class="widget-header">
      <div class="widget-title">Product mix vs target</div>
      <div class="widget-subtitle">FY 2026 · units</div>
    </div>
    <div class="widget-body">
      <table>
        <thead>
          <tr>
            <th>Product category</th>
            <th class="num">Target</th>
            <th class="num">Won</th>
            <th class="num">Proposed</th>
            <th class="num">Forecast gap</th>
          </tr>
        </thead>
        <tbody>
          <tr class="attn">
            <td class="category">Mini</td>
            <td class="num">12</td>
            <td class="num">5</td>
            <td class="num">2</td>
            <td class="gap"><span class="badge red">−5</span></td>
          </tr>
          <tr class="attn">
            <td class="category">Service Contract</td>
            <td class="num">20</td>
            <td class="num">13</td>
            <td class="num">4</td>
            <td class="gap"><span class="badge amber">−3</span></td>
          </tr>
          <tr>
            <td class="category">Midi</td>
            <td class="num">8</td>
            <td class="num">7</td>
            <td class="num">1</td>
            <td class="gap"><span class="badge grey">0</span></td>
          </tr>
          <tr>
            <td class="category">Wheeled</td>
            <td class="num">6</td>
            <td class="num">5</td>
            <td class="num">1</td>
            <td class="gap"><span class="badge grey">0</span></td>
          </tr>
          <tr>
            <td class="category">Loader</td>
            <td class="num">10</td>
            <td class="num">9</td>
            <td class="num">2</td>
            <td class="gap"><span class="badge green">+1</span></td>
          </tr>
          <tr>
            <td class="category">Excavator</td>
            <td class="num">14</td>
            <td class="num">12</td>
            <td class="num">3</td>
            <td class="gap"><span class="badge green">+1</span></td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="widget-footer">
      <span class="k"><span class="dot" style="background:#d94a45"></span>Behind target</span>
      <span class="k"><span class="dot" style="background:#b8bcc6"></span>On track</span>
      <span class="k"><span class="dot" style="background:#4caf6e"></span>Ahead of target</span>
    </div>
  </div>
</body>
</html>
